<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skyze Zone — Weather Forecast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="logo">Skyze <span>Zone</span></div>
      <div class="header-time" id="headerTime"></div>
    </header>

    <div class="search-wrap">
      <div class="search-box">
        <input type="text" id="locInput" placeholder="Search location — city, barangay, province…" autocomplete="off" />
        <button class="btn-gps" id="btnGps" title="Use my location" aria-label="Use my location">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
            <circle cx="12" cy="12" r="9" stroke-dasharray="2 4"/>
          </svg>
        </button>
        <button class="btn-search" id="btnSearch">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Search
        </button>
      </div>
      <div class="suggestions" id="suggestions"></div>
    </div>

    <div id="content">
      <div class="status">
        <div class="status-icon">🌍</div>
        <div class="status-text">Search any location worldwide</div>
        <div class="status-sub">Supports barangay, city, province, and country names</div>
        <button class="btn-gps-big" id="btnGpsBig">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          </svg>
          Use my current location
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
